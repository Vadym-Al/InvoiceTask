services:
  db:
    image: postgres:16-alpine
    container_name: invoice-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - invoice-network
  app:
    build: .
    container_name: invoice-app
    depends_on:
      - db
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    environment:
      SERVER_PORT: ${APP_PORT}
    networks:
      - invoice-network

volumes:
  postgres_data:

networks:
  invoice-network: